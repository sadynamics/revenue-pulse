<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Revenue Pulse · Subscription Analytics</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#7c5cff', 600: '#6b49ff' },
            ink: {
              950: '#0a0b10', 900: '#0f1117', 800: '#151823',
              700: '#1c2030', 600: '#2a2f44', 500: '#3d4361',
              400: '#6b7194', 300: '#9ca3c4', 200: '#c9ccdf', 100: '#e9ebf5'
            },
            ok: '#22c55e', warn: '#f59e0b', bad: '#ef4444', info: '#3b82f6',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          }
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="font-sans bg-ink-950 text-ink-100 antialiased min-h-screen">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 shrink-0 border-r border-ink-700/60 bg-ink-900/80 backdrop-blur flex flex-col">
      <div class="px-5 py-5 flex items-center gap-3 border-b border-ink-700/60">
        <div class="h-9 w-9 rounded-lg bg-gradient-to-br from-brand-500 to-fuchsia-500 grid place-items-center text-white font-bold">⚡</div>
        <div>
          <div class="font-semibold text-ink-100">Revenue Pulse</div>
          <div class="text-xs text-ink-400">Subscription analytics</div>
        </div>
      </div>
      <nav class="px-3 py-4 space-y-1 flex-1">
        <a href="#overview"     data-route="overview"     class="nav-link"><span>📊</span> Overview</a>
        <a href="#subscribers"  data-route="subscribers"  class="nav-link"><span>👥</span> Subscribers</a>
        <a href="#events"       data-route="events"       class="nav-link"><span>📨</span> Events</a>
        <a href="#renewals"     data-route="renewals"     class="nav-link"><span>🔄</span> Renewals</a>
        <a href="#churn"        data-route="churn"        class="nav-link"><span>📉</span> Churn</a>
        <a href="#products"     data-route="products"     class="nav-link"><span>🏷️</span> Products</a>
        <a href="#geography"    data-route="geography"    class="nav-link"><span>🌍</span> Geography</a>
        <a href="#debug"        data-route="debug"        class="nav-link"><span>🧪</span> Webhook Debug</a>
      </nav>
      <div class="p-3 border-t border-ink-700/60">
        <div class="flex items-center gap-2 text-xs text-ink-400">
          <span id="live-dot" class="h-2 w-2 rounded-full bg-gray-500"></span>
          <span id="live-text">connecting…</span>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 min-w-0">
      <header class="sticky top-0 z-10 bg-ink-900/70 backdrop-blur border-b border-ink-700/60">
        <div class="px-8 py-4 flex items-center gap-4">
          <h1 id="page-title" class="text-xl font-semibold">Overview</h1>
          <div id="page-sub" class="text-sm text-ink-400"></div>
          <div class="ml-auto flex items-center gap-3">
            <label class="flex items-center gap-2 text-xs text-ink-400">
              <span>App</span>
              <select id="app-select"
                      class="bg-ink-800 border border-ink-700 rounded-md text-ink-100 text-sm px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-brand-500">
                <option value="">All apps</option>
              </select>
            </label>
            <button id="refresh-btn" class="btn-ghost text-sm">↻ Refresh</button>
            <span class="text-xs text-ink-400" id="last-updated">—</span>
          </div>
        </div>
      </header>

      <div id="page" class="p-8 space-y-8"></div>
    </main>
  </div>

  <!-- Realtime toast container -->
  <div id="toast-root" class="fixed top-4 right-4 z-50 space-y-2 w-80"></div>

  <!-- Subscriber detail modal -->
  <div id="sub-modal" class="hidden fixed inset-0 z-40 bg-black/60 backdrop-blur-sm">
    <div class="absolute inset-y-0 right-0 w-full max-w-2xl bg-ink-900 border-l border-ink-700 overflow-y-auto">
      <div id="sub-modal-body" class="p-8"></div>
    </div>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
